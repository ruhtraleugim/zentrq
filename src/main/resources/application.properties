spring.application.name=zentrq

# Database
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/zentrq}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# JWT
app.jwt.secret=${JWT_SECRET:change-me-in-production-must-be-at-least-256-bits-long-secret}
app.jwt.expiration-ms=86400000

# Resend
app.resend.api-key=${RESEND_API_KEY:re_j4th1en3_GmgKxXmKAMVAPhXhX6kA1CX9}
app.resend.from=${RESEND_FROM:onboarding@resend.dev}

# AbacatePay
app.abacatepay.base-url=${ABACATEPAY_BASE_URL:https://api.abacatepay.com}
app.abacatepay.api-key=${ABACATEPAY_KEY:abc_dev_2y6JACDnfjgEDPTadZmH0g3E}
app.abacatepay.webhook-secret=${WEBHOOK_SECRET:change-me}

# Platform fee
app.platform-fee=0.10

# Frontend URL (usado no returnUrl do AbacatePay)
app.frontend-url=${FRONTEND_URL:http://localhost:3000}
